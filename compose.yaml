services:
  product-registry-db:
    image: postgres:17.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: Registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - product-registry-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d Registry" ]
      interval: 10s
      timeout: 5s
      retries: 5

  discount-mock:
    image: holomekc/wiremock-gui:latest
    restart: unless-stopped
    volumes:
      - ./wiremock:/home/wiremock
    networks:
      - product-registry-network
    command: [ "--global-response-templating", "--verbose" ]
    # --global-response-templating  habilita Handlebars en todos los mappings
    # --verbose  loguea cada request/response, útil en dev

volumes:
  postgres_data:

networks:
  product-registry-network:
    driver: bridge
